name: "Godot iOS Build (Unsigned)"

on:
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-ios:
    runs-on: macos-13 # Using macOS-13 (Intel) ensures maximum compatibility with Godot 3.x Mono tools
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Install Mono
      - name: Install Mono
        run: |
          brew install mono

      # 2. Setup Godot Mono & Mono Export Templates for macOS
      - name: Setup Godot Mono & Templates
        run: |
          # Download macOS Mono Engine
          wget -nv -O Godot_osx.zip "https://downloads.godotengine.org/3.5.3/mono/Godot_v3.5.3-stable_mono_osx.universal.zip"
          unzip -q Godot_osx.zip
          # On macOS, Godot extracts as "Godot_mono.app"

          # Download Templates
          wget -nv -O Godot_templates.tpz "https://downloads.godotengine.org/3.5.3/mono/Godot_v3.5.3-stable_mono_export_templates.tpz"

          # Extract to a temporary folder
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates

          # macOS Godot looks for templates in Library/Application Support, not .local/share
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"

          # Move files directly into the destination
          mv /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"

          echo "--- VERIFYING TEMPLATES ---"
          ls -la "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"

      # 3. Build C# Solution
      - name: Build C# Solution
        run: |
          # Define the path to the macOS Godot executable
          GODOT_CMD="$(pwd)/Godot_mono.app/Contents/MacOS/Godot"

          # 1. Clean up Windows absolute paths (macOS `sed` requires an empty string argument '' for -i)
          sed -i '' 's|C:/Users/[^/]*/||g' "Lacie Engine.csproj"

          # 2. Restore packages
          dotnet restore "Lacie Engine.csproj"

          # 3. Force Godot to build the solution
          "$GODOT_CMD" --no-window --build-solutions --quit || true

      # 4. Export Godot iOS Xcode Project
      - name: Export Xcode Project
        run: |
          GODOT_CMD="$(pwd)/Godot_mono.app/Contents/MacOS/Godot"
          mkdir -p build/ios

          # This exports the Xcode project into the build/ios folder.
          # Ensure your export preset in export_presets.cfg is named exactly "iOS"
          "$GODOT_CMD" --no-window --export "iOS" build/ios/Paper-Lily-iOS

      # 5. Compile Xcode Project Without Signature
      - name: Compile Unsigned iOS App
        run: |
          cd build/ios

          # Dynamically grab the Xcode project name generated by Godot
          XCODE_PROJ=$(ls *.xcodeproj)
          TARGET_NAME=$(basename "$XCODE_PROJ" .xcodeproj)

          echo "Building target: $TARGET_NAME from $XCODE_PROJ"

          # Use xcodebuild to compile without requiring code signing profiles
          xcodebuild -project "$XCODE_PROJ" \
            -target "$TARGET_NAME" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          # Package the compiled .app into an Unsigned .ipa format
          mkdir Payload
          cp -R build/Release-iphoneos/*.app Payload/
          zip -q -r ../../Paper-Lily-iOS-Unsigned.ipa Payload

      # 6. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-iOS-Unsigned
          path: Paper-Lily-iOS-Unsigned.ipa
